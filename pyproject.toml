[tool.ruff]
target-version = "py314"
exclude = [".git", ".venv", "migrations", "__pycache__", "alembic/versions"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "ARG",
    "PT",
]

ignore = [
    "B008",
    "E712",
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"